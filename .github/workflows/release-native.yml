name: Release Native

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "How to choose the release version."
        required: true
        default: minor
        type: choice
        options:
          - minor
          - patch
          - major
          - manual
      manual_version:
        description: "Manual version override, for example 0.3.0. Only used when release_type is manual."
        required: false
        type: string

env:
  PROJECT_NAME: NeuralAmpModeler

permissions:
  contents: write

concurrency:
  group: release-native
  cancel-in-progress: false

jobs:
  prepare_release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{steps.prepare.outputs.tag}}
      release_version: ${{steps.prepare.outputs.version}}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Prepare release metadata
        id: prepare
        run: |
          VERSION_ARGS=()
          BUMP_TYPE="${{ inputs.release_type }}"

          if [ "$BUMP_TYPE" = "manual" ]; then
            if [ -z "${{ inputs.manual_version }}" ]; then
              echo "manual_version is required when release_type is manual" >&2
              exit 1
            fi
            VERSION_ARGS+=(--version "${{ inputs.manual_version }}")
            BUMP_TYPE="minor"
          fi

          python3 prepare_release.py --bump "$BUMP_TYPE" "${VERSION_ARGS[@]}" --github-output "$GITHUB_OUTPUT"
        shell: bash

      - name: Commit release metadata
        run: |
          git add \
            NeuralAmpModeler/config.h \
            NeuralAmpModeler/installer/changelog.txt \
            NeuralAmpModeler/installer/VoLum.iss \
            NeuralAmpModeler/resources/*.plist
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "release: prepare ${{ steps.prepare.outputs.tag }}"
        shell: bash

      - name: Push release commit
        run: git push origin HEAD:main
        shell: bash

      - name: Create and push release tag
        run: |
          git tag "${{ steps.prepare.outputs.tag }}"
          git push origin "${{ steps.prepare.outputs.tag }}"
        shell: bash

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.prepare.outputs.tag }}" \
            --draft \
            --generate-notes \
            --title "VoLum ${{ steps.prepare.outputs.tag }}"
        shell: bash

  build:
    name: Build
    needs: prepare_release
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            build_dir: build-mac
          - os: windows-latest
            build_dir: build-win

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        ref: refs/tags/${{ needs.prepare_release.outputs.release_tag }}
        submodules: recursive

    - name: Get VST3 SDK
      run: |
        cd iPlug2/Dependencies/IPlug
        ./download-iplug-sdks.sh
      shell: bash

    - name: Get Prebuilt Libs
      run: |
        cd iPlug2/Dependencies
        ./download-prebuilt-libs.sh
      shell: bash

    - name: Get Archive Name macOS
      id: mac_archivename_step
      if: matrix.os == 'macos-latest'
      run: |
        ARCHIVE_NAME=`python3 iPlug2/Scripts/get_archive_name.py ${{env.PROJECT_NAME}} mac full`
        echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build macOS
      if: matrix.os == 'macos-latest'
      run: |
        cd ${{env.PROJECT_NAME}}/scripts
        ./makedist-mac.sh full zip
      shell: bash

    - name: Verify macOS artifacts
      if: matrix.os == 'macos-latest'
      run: |
        APP_BIN="$HOME/Applications/VoLum.app/Contents/MacOS/VoLum"
        VST3_BIN="$HOME/Library/Audio/Plug-Ins/VST3/VoLum.vst3/Contents/MacOS/VoLum"
        APP_PLIST="$HOME/Applications/VoLum.app/Contents/Info.plist"
        APP_DMG="${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.mac_archivename_step.outputs.archive_name}}-app.dmg"
        VST3_ZIP="${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.mac_archivename_step.outputs.archive_name}}-vst3.zip"
        VERIFY_DIR="${{env.PROJECT_NAME}}/${{matrix.build_dir}}/verify-mac"

        app_archs=$(lipo -archs "$APP_BIN")
        vst3_archs=$(lipo -archs "$VST3_BIN")
        main_nib=$(/usr/libexec/PlistBuddy -c 'Print :NSMainNibFile' "$APP_PLIST")

        echo "APP architectures: $app_archs"
        echo "VST3 architectures: $vst3_archs"
        echo "APP main nib: $main_nib"

        [[ "$app_archs" == *arm64* && "$app_archs" == *x86_64* ]]
        [[ "$vst3_archs" == *arm64* && "$vst3_archs" == *x86_64* ]]
        test -f "$HOME/Applications/VoLum.app/Contents/Resources/${main_nib}.nib"
        test -d "$HOME/Applications/VoLum.app/Contents/Resources/VoLumRigs"
        test -f "$APP_DMG"
        test -f "$VST3_ZIP"

        rm -rf "$VERIFY_DIR"
        mkdir -p "$VERIFY_DIR"
        hdiutil attach "$APP_DMG" -nobrowse -readonly -mountpoint "$VERIFY_DIR/dmg"
        unzip -q "$VST3_ZIP" -d "$VERIFY_DIR/vst3"

        test -d "$VERIFY_DIR/dmg/VoLum.app"
        test -d "$VERIFY_DIR/dmg/VoLum.app/Contents/Resources/VoLumRigs"
        test -f "$VERIFY_DIR/dmg/VoLum.app/Contents/Resources/VoLumRigs/Ampete One/AMP-Ampt-1.nam"
        test -d "$VERIFY_DIR/vst3/VoLum.vst3"
        test -d "$VERIFY_DIR/vst3/VoLumRigs"
        test -f "$VERIFY_DIR/vst3/VoLumRigs/Ampete One/AMP-Ampt-1.nam"
        hdiutil detach "$VERIFY_DIR/dmg"
      shell: bash

    - name: Upload mac DSYMs release asset
      if: matrix.os == 'macos-latest'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload "${{ needs.prepare_release.outputs.release_tag }}" \
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.mac_archivename_step.outputs.archive_name}}-dSYMs.zip" \
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.mac_archivename_step.outputs.archive_name}}-app.dmg" \
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.mac_archivename_step.outputs.archive_name}}-vst3.zip" \
          --clobber
      shell: bash

    - name: Add msbuild to PATH (Windows)
      if: matrix.os == 'windows-latest'
      uses: microsoft/setup-msbuild@v2

    - name: Setup Python3
      if: matrix.os == 'windows-latest'
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        architecture: 'x64'

    - name: Install Inno Setup
      if: matrix.os == 'windows-latest'
      run: choco install innosetup -y
      shell: pwsh

    - name: Get Archive Name Windows
      id: win_archivename_step
      if: matrix.os == 'windows-latest'
      run: |
        ARCHIVE_NAME=`python.exe iPlug2/Scripts/get_archive_name.py ${{env.PROJECT_NAME}} win full`
        echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      run: |
        cd ${{env.PROJECT_NAME}}\scripts
        .\makedist-win.bat full installer
      shell: pwsh

    - name: Build Windows portable zip
      if: matrix.os == 'windows-latest'
      run: |
        cd ${{env.PROJECT_NAME}}\scripts
        .\makedist-win.bat full zip
      shell: pwsh

    - name: Verify Windows portable artifacts
      if: matrix.os == 'windows-latest'
      run: |
        $zipPath = Join-Path "${{env.PROJECT_NAME}}\${{matrix.build_dir}}\out" "${{steps.win_archivename_step.outputs.archive_name}}.zip"
        $verifyDir = Join-Path "${{env.PROJECT_NAME}}\${{matrix.build_dir}}" "verify-win"

        Write-Host "Portable zip: $zipPath"
        if (-not (Test-Path $zipPath)) { throw "Portable zip not found: $zipPath" }

        if (Test-Path $verifyDir) { Remove-Item $verifyDir -Recurse -Force }
        New-Item -ItemType Directory -Path $verifyDir | Out-Null
        Expand-Archive -Path $zipPath -DestinationPath $verifyDir -Force

        $exePath = Join-Path $verifyDir "VoLum_x64.exe"
        $vst3Path = Join-Path $verifyDir "VoLum.vst3"
        $rigsPath = Join-Path $verifyDir "VoLumRigs"
        $sampleRig = Join-Path $rigsPath "Ampete One\AMP-Ampt-1.nam"

        if (-not (Test-Path $exePath)) { throw "Missing standalone exe: $exePath" }
        if (-not (Test-Path $vst3Path)) { throw "Missing VST3 bundle: $vst3Path" }
        if (-not (Test-Path $rigsPath)) { throw "Missing VoLumRigs folder: $rigsPath" }
        if (-not (Test-Path $sampleRig)) { throw "Missing sample rig: $sampleRig" }
      shell: pwsh

    - name: Upload Windows release assets
      if: matrix.os == 'windows-latest'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $tag = "${{ needs.prepare_release.outputs.release_tag }}"
        $archive = "${{ steps.win_archivename_step.outputs.archive_name }}"
        gh release upload $tag `
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/$archive-pdbs.zip" `
          "${{env.PROJECT_NAME}}/build-win/installer/VoLum-Setup.exe#VoLum-Setup.exe" `
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/$archive.zip#$archive-portable.zip" `
          --clobber
      shell: pwsh
