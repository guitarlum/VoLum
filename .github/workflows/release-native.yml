name: Release Native

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag for this draft release (e.g. v0.2.0). The tag is created at the workflow commit if it does not exist yet."
        required: true
        default: "v0.0.0-ci"
  push:
    tags:
      - "v*"

env:
  PROJECT_NAME: NeuralAmpModeler

jobs:
  create_release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{steps.create_release.outputs.upload_url}}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          draft: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          release_name: Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          commitish: ${{ github.sha }}
          body_path: ${{env.PROJECT_NAME}}/installer/changelog.txt

  build:
    name: Build
    needs: create_release
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            build_dir: build-mac
          - os: windows-latest
            build_dir: build-win

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Get VST3 SDK
      run: |
        cd iPlug2/Dependencies/IPlug
        ./download-iplug-sdks.sh
      shell: bash

    - name: Get Prebuilt Libs
      run: |
        cd iPlug2/Dependencies
        ./download-prebuilt-libs.sh
      shell: bash

    - name: Get Archive Name macOS
      id: mac_archivename_step
      if: matrix.os == 'macos-latest'
      run: |
        ARCHIVE_NAME=`python3 iPlug2/Scripts/get_archive_name.py ${{env.PROJECT_NAME}} mac full`
        echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build macOS
      if: matrix.os == 'macos-latest'
      run: |
        cd ${{env.PROJECT_NAME}}/scripts
        ./makedist-mac.sh full zip
      shell: bash

    - name: Verify macOS artifacts
      if: matrix.os == 'macos-latest'
      run: |
        APP_BIN="$HOME/Applications/VoLum.app/Contents/MacOS/VoLum"
        VST3_BIN="$HOME/Library/Audio/Plug-Ins/VST3/VoLum.vst3/Contents/MacOS/VoLum"
        APP_PLIST="$HOME/Applications/VoLum.app/Contents/Info.plist"
        APP_DMG="${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.mac_archivename_step.outputs.archive_name}}-app.dmg"
        VST3_ZIP="${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.mac_archivename_step.outputs.archive_name}}-vst3.zip"
        VERIFY_DIR="${{env.PROJECT_NAME}}/${{matrix.build_dir}}/verify-mac"

        app_archs=$(lipo -archs "$APP_BIN")
        vst3_archs=$(lipo -archs "$VST3_BIN")
        main_nib=$(/usr/libexec/PlistBuddy -c 'Print :NSMainNibFile' "$APP_PLIST")

        echo "APP architectures: $app_archs"
        echo "VST3 architectures: $vst3_archs"
        echo "APP main nib: $main_nib"

        [[ "$app_archs" == *arm64* && "$app_archs" == *x86_64* ]]
        [[ "$vst3_archs" == *arm64* && "$vst3_archs" == *x86_64* ]]
        test -f "$HOME/Applications/VoLum.app/Contents/Resources/${main_nib}.nib"
        test -d "$HOME/Applications/VoLum.app/Contents/Resources/VoLumRigs"
        test -f "$APP_DMG"
        test -f "$VST3_ZIP"

        rm -rf "$VERIFY_DIR"
        mkdir -p "$VERIFY_DIR"
        hdiutil attach "$APP_DMG" -nobrowse -readonly -mountpoint "$VERIFY_DIR/dmg"
        unzip -q "$VST3_ZIP" -d "$VERIFY_DIR/vst3"

        test -d "$VERIFY_DIR/dmg/VoLum.app"
        test -d "$VERIFY_DIR/dmg/VoLum.app/Contents/Resources/VoLumRigs"
        test -f "$VERIFY_DIR/dmg/VoLum.app/Contents/Resources/VoLumRigs/Ampete One/AMP-Ampt-1.nam"
        test -d "$VERIFY_DIR/vst3/VoLum.vst3"
        test -d "$VERIFY_DIR/vst3/VoLumRigs"
        test -f "$VERIFY_DIR/vst3/VoLumRigs/Ampete One/AMP-Ampt-1.nam"
        hdiutil detach "$VERIFY_DIR/dmg"
      shell: bash

    - name: Upload mac DSYMs release asset
      if: matrix.os == 'macos-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      with:
        upload_url: ${{needs.create_release.outputs.upload_url}}
        asset_path: ${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.mac_archivename_step.outputs.archive_name}}-dSYMs.zip
        asset_name: ${{steps.mac_archivename_step.outputs.archive_name}}-dSYMs.zip
        asset_content_type: application/zip

    - name: Upload mac app dmg release asset
      if: matrix.os == 'macos-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      with:
        upload_url: ${{needs.create_release.outputs.upload_url}}
        asset_path: ${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.mac_archivename_step.outputs.archive_name}}-app.dmg
        asset_name: ${{steps.mac_archivename_step.outputs.archive_name}}-app.dmg
        asset_content_type: application/octet-stream

    - name: Upload mac VST3 zip release asset
      if: matrix.os == 'macos-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      with:
        upload_url: ${{needs.create_release.outputs.upload_url}}
        asset_path: ${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.mac_archivename_step.outputs.archive_name}}-vst3.zip
        asset_name: ${{steps.mac_archivename_step.outputs.archive_name}}-vst3.zip
        asset_content_type: application/zip

    - name: Add msbuild to PATH (Windows)
      if: matrix.os == 'windows-latest'
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Setup Python3
      if: matrix.os == 'windows-latest'
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
        architecture: 'x64'

    - name: Install Inno Setup
      if: matrix.os == 'windows-latest'
      run: choco install innosetup -y
      shell: pwsh

    - name: Get Archive Name Windows
      id: win_archivename_step
      if: matrix.os == 'windows-latest'
      run: |
        ARCHIVE_NAME=`python.exe iPlug2/Scripts/get_archive_name.py ${{env.PROJECT_NAME}} win full`
        echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      run: |
        cd ${{env.PROJECT_NAME}}\scripts
        .\makedist-win.bat full installer
      shell: pwsh

    - name: Build Windows portable zip
      if: matrix.os == 'windows-latest'
      run: |
        cd ${{env.PROJECT_NAME}}\scripts
        .\makedist-win.bat full zip
      shell: pwsh

    - name: Upload Windows pdb release asset
      if: matrix.os == 'windows-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      with:
        upload_url: ${{needs.create_release.outputs.upload_url}}
        asset_path: ${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.win_archivename_step.outputs.archive_name}}-pdbs.zip
        asset_name: ${{steps.win_archivename_step.outputs.archive_name}}-pdbs.zip
        asset_content_type: application/zip

    - name: Upload Windows installer release asset
      if: matrix.os == 'windows-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      with:
        upload_url: ${{needs.create_release.outputs.upload_url}}
        asset_path: ${{env.PROJECT_NAME}}/build-win/installer/VoLum-Setup.exe
        asset_name: VoLum-Setup.exe
        asset_content_type: application/octet-stream

    - name: Upload Windows portable zip release asset
      if: matrix.os == 'windows-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      with:
        upload_url: ${{needs.create_release.outputs.upload_url}}
        asset_path: ${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${{steps.win_archivename_step.outputs.archive_name}}.zip
        asset_name: ${{steps.win_archivename_step.outputs.archive_name}}-portable.zip
        asset_content_type: application/zip
